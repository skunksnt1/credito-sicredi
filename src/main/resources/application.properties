# Datasource
quarkus.datasource.db-kind=postgresql

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# REST Client - Produto Credito
quarkus.rest-client."br.com.sicredi.credito.client.ProdutoCreditoClient".url=http://localhost:8081
quarkus.rest-client."br.com.sicredi.credito.client.ProdutoCreditoClient".connect-timeout=5000
quarkus.rest-client."br.com.sicredi.credito.client.ProdutoCreditoClient".read-timeout=5000

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.info-title=Sicredi - API de Aquisicao de Credito
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API REST para contratacao e consulta de operacoes de credito do Sicredi. Utilize o botao Authorize e informe o token para acessar os endpoints.\n\nEmpresa: DB - Unidade AR\n\nResponsavel: Onisio Simoes Queiroz Junior\nTelefone: (79) 99648-7727
quarkus.smallrye-openapi.info-contact-name=Onisio Simoes Queiroz Junior
quarkus.smallrye-openapi.info-contact-email=onisio@db-unidadear.com.br
quarkus.smallrye-openapi.info-contact-url=https://db-unidadear.com.br
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.theme=flattop
quarkus.swagger-ui.path=/swagger

# Token de autenticacao da API
api.token=sicredi-credito-2026
